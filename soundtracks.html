<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Todas las canciones y compositores que aparecen en Oesti Quest, el juego diario de adivinar bandas sonoras de videojuegos.">
  <title>Lista de canciones — Oesti Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="48x48" href="img/logo.png">
  <style>
    .score-bar { display: none !important; }

    .st-intro { margin: 20px 0 24px; }
    .st-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: #b8e030; margin-bottom: 6px;
    }
    .st-desc { font-size: 13px; color: #7a7a88; line-height: 1.5; }

    .st-list {
      columns: 2;
      column-gap: 24px;
    }
    .st-entry { break-inside: avoid; margin-bottom: 14px; }
    @media (max-width: 480px) { .st-list { columns: 1; } }

    .st-game {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
      color: #ddd9cf; margin-bottom: 3px; line-height: 1.2;
    }
    .st-year { font-weight: 400; color: #555960; margin-left: 5px; font-size: 13px; }
    .st-tracks { display: flex; flex-direction: column; gap: 1px; }
    .st-track {
      font-size: 12px; color: #7a7a88;
      display: flex; align-items: baseline; gap: 5px; line-height: 1.4;
    }
    .st-track::before { content: "·"; color: #3a3a44; flex-shrink: 0; }
    .st-track__title { color: #9898a8; }
    .st-track__artist { color: #555960; font-size: 11px; }
    .st-track__artist::before { content: "— "; }

    body.theme--light .st-heading   { color: #4a6c10; }
    body.theme--light .st-desc      { color: #9898a8; }
    body.theme--light .st-game      { color: #1e1d28; }
    body.theme--light .st-year      { color: #9898a8; }
    body.theme--light .st-track::before  { color: #c8c4bc; }
    body.theme--light .st-track__title   { color: #3a3a4a; }
    body.theme--light .st-track__artist  { color: #9898a8; }

    .st-play-banner {
      background: #14141e;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      padding: 18px 22px;
      text-align: center;
      margin-bottom: 22px;
    }
    .st-play-banner__text {
      font-size: 32px; color: #ddd9cf; margin-bottom: 12px; line-height: 1.2;
    }
    .st-play-banner__btn {
      display: inline-block; background: #b8e030; color: #0e0e14;
      font-weight: 700; font-size: 15px; padding: 8px 18px;
      border-radius: 6px; text-decoration: none; letter-spacing: 0.3px;
    }
    .st-play-banner__btn:hover { background: #c8f040; }

    body.theme--light .st-play-banner        { background: #f4f4ec; border-color: #d0ccc4; }
    body.theme--light .st-play-banner__text  { color: #1e1d28; }
    body.theme--light .st-play-banner__btn   { background: #4a6c10; color: #fff; }
    body.theme--light .st-play-banner__btn:hover { background: #3a5c00; }
  </style>
</head>
<body>
<script>if(localStorage.getItem('ostquest_theme')==='light')document.body.classList.add('theme--light');</script>
<script>window.SOUNDTRACKS_PAGE = true;</script>

<noscript>
  <div style="max-width:760px;margin:3rem auto;padding:1.5rem;font-family:system-ui,sans-serif;color:#ddd9cf;text-align:center">
    <h1>Bandas sonoras — Oesti Quest</h1>
    <p style="margin-top:.75rem;color:#888">Activa JavaScript para ver la lista completa de canciones.</p>
  </div>
</noscript>

<div class="app-wrapper">

  <header class="site-header">
    <div class="site-header__left">
      <a href="index.html"><img src="img/banner.png" alt="Oesti Quest" class="site-banner"></a>
      <span class="site-tagline" data-i18n="tagline">Adivina la OST</span>
    </div>
    <div class="site-header__right">
      <div class="archive-banner" id="archive-banner"></div>
      <div class="header-countdown">
        <span data-i18n="next_quest">Siguiente quest:</span> <span id="header-countdown">--:--:--</span>
      </div>
      <button class="today-btn" id="btn-today" data-i18n="btn_today">Hoy</button>
      <button class="icon-btn" id="btn-archive" data-i18n-aria="btn_archive_label" aria-label="Quest Log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6H6z"/>
          <path d="M14 2v6h6"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-stats" data-i18n-aria="btn_stats_label" aria-label="Estadísticas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
    </div>
  </header>

  <button class="theme-btn" id="btn-theme" aria-label="Modo claro">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>
  <button class="icon-btn icon-btn--ghost" id="btn-help" aria-label="Ayuda">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round" stroke-width="2.5"/>
    </svg>
  </button>

  <div class="settings-panel">
    <div class="vol-control" id="vol-control">
      <button class="vol-btn" id="btn-vol" aria-label="Volumen">
        <svg id="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="vol-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <div class="vol-slider-wrap">
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80">
      </div>
    </div>
    <div class="lang-dropdown" id="lang-dropdown">
      <button class="lang-dropdown__btn" id="lang-dropdown-btn" aria-haspopup="true" aria-expanded="false">
        <span id="lang-dropdown-flag"><svg class="lang-flag-svg" viewBox="0 0 20 14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="14" fill="#c60b1e"/><rect y="3.5" width="20" height="7" fill="#ffc400"/></svg></span>
        <span id="lang-dropdown-label">Español</span>
        <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="lang-dropdown__chevron"><path d="M1 1l4 4 4-4"/></svg>
      </button>
      <div class="lang-dropdown__menu" id="lang-dropdown-menu">
        <button class="lang-dropdown__option" data-lang="es"><svg class="lang-flag-svg" viewBox="0 0 20 14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="14" fill="#c60b1e"/><rect y="3.5" width="20" height="7" fill="#ffc400"/></svg> Español</button>
        <button class="lang-dropdown__option" data-lang="en"><svg class="lang-flag-svg" viewBox="0 0 20 14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="14" fill="#012169"/><path d="M0,0 L20,14 M20,0 L0,14" stroke="white" stroke-width="4"/><path d="M0,0 L20,14 M20,0 L0,14" stroke="#c8102e" stroke-width="2"/><rect x="8.5" y="0" width="3" height="14" fill="white"/><rect x="0" y="5.5" width="20" height="3" fill="white"/><rect x="9.25" y="0" width="1.5" height="14" fill="#c8102e"/><rect x="0" y="6.25" width="20" height="1.5" fill="#c8102e"/></svg> English</button>
      </div>
    </div>
  </div>

  <!-- Required by game.js for modals and score display -->
  <div class="score-bar">
    <div><span id="score-hits">0</span></div>
    <div><span id="score-miss">0</span></div>
  </div>
  <div id="gm-panel" style="display:none"></div>
  <div id="loading-screen" style="display:none"></div>
  <div id="game-area" style="display:none"><div class="columns-wrapper" id="columns-wrapper"></div></div>

  <div id="st-play-banner" class="st-play-banner" style="display:none">
    <p class="st-play-banner__text" data-i18n="soundtracks_cta_text">¿Podrías adivinar la OST de tu juego favorito?</p>
    <a href="index.html" class="st-play-banner__btn" data-i18n="soundtracks_cta_btn">Resuelve la quest de hoy →</a>
  </div>

  <div class="st-intro">
    <h1 class="st-heading" data-i18n="soundtracks_heading">Lista de canciones</h1>
  </div>

  <div id="soundtracks-list" class="st-list"></div>

  <footer class="site-footer" style="margin-top:32px">
    <p data-i18n-html="footer_credit"></p>
  </footer>

</div>

<div id="modal" role="dialog" aria-modal="true">
  <div id="modal-inner"></div>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="js/database.js"></script>
<script src="js/i18n.js"></script>
<script src="js/daily.js"></script>
<script src="js/algorithm.js"></script>
<script src="js/assets.js"></script>
<script src="js/player.js"></script>
<script src="js/game.js"></script>
<script src="js/soundtracks.js"></script>
</body>
</html>
