<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Database Editor - OST Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --panel: #1a1d22;
      --panel2: #232731;
      --text: #eef0f4;
      --muted: #a9b0bd;
      --line: #333846;
      --accent: #28d7e8;
      --danger: #ff6666;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(17, 19, 22, 0.96);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: .2px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button, input, select, textarea {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      font-weight: 650;
    }
    button.primary {
      background: var(--accent);
      color: #031013;
      border-color: transparent;
    }
    button.danger {
      background: #3b1f24;
      color: #ffd9df;
      border-color: #76333f;
    }
    button.success {
      background: #27a048;
      color: #fff;
      border-color: transparent;
    }
    img.cover-preview { cursor: zoom-in; }
    .btn-group {
      display: flex;
      gap: 4px;
      background: rgba(40, 215, 232, 0.08);
      border: 1px solid rgba(40, 215, 232, 0.2);
      border-radius: 10px;
      padding: 4px;
    }
    #custom-confirm {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    #custom-confirm-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 420px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    #custom-confirm-msg {
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
    }
    #custom-confirm-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: zoom-out;
    }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
    }
    .scroll-btns {
      position: fixed;
      bottom: 78px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
    }
    .scroll-btns button {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 18px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    input[type="file"] { max-width: 290px; }
    #search {
      min-width: 0;
    }
    main {
      padding: 16px;
      max-width: 1700px;
      margin: 0 auto;
    }
    code { color: #d8e3ff; }
    .info {
      color: var(--muted);
      margin: 10px 0 14px;
      line-height: 1.45;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0 14px;
    }
    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
    }
    .pill strong { color: var(--text); }
    .pill.warn { border-color: #ffd166; color: #ffe7a0; }
    .search-stats {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      align-self: center;
      padding: 0 2px;
    }
    .search-stats strong { color: var(--text); }
    .list {
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      align-items: start;
      min-height: 140px;
    }
    .list.filtering .row.hidden { display: none; }
    .cover-box {
      display: grid;
      gap: 6px;
    }
    .cover-preview {
      width: 130px;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: #080a0d;
      border: 1px solid #2b303b;
      border-radius: 8px;
    }
    .cover-preview.missing {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 8px;
      object-fit: unset;
    }
    .meta {
      display: grid;
      gap: 8px;
    }
    .titleline {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .game-title {
      font-weight: 800;
      font-size: 16px;
      line-height: 1.25;
      flex: 1;
    }
    .row-id {
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .meta-fields {
      display: grid;
      grid-template-columns: 1fr 1fr auto 68px 52px;
      gap: 8px;
      align-items: end;
    }
    .yt-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 65px auto;
      gap: 8px;
      align-items: end;
    }
    .yt-row > label { min-width: 0; }
    .yt-row input { width: 100%; min-width: 0; }
    input[data-field="startSeconds"], #newStart { width: 65px; min-width: 0; }
    .track-block { display: flex; flex-direction: column; gap: 4px; }
    .track-block + .track-block { margin-top: 6px; }
    .track-block--extra { position: relative; }
    .track-block--extra > button.danger { position: absolute; left: -34px; top: 0; }
    .track-title-input { width: 100%; min-width: 0; font-size: 13px; }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }
    label span { padding-left: 2px; }
    .field-youtube, .field-cover {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .game-input { width: 100%; }
    .meta-fields input { width: 100%; min-width: 0; }
    .meta-fields > button { white-space: nowrap; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .small {
      font-size: 12px;
      padding: 6px 8px;
    }
    .cover-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      align-self: center;
    }
    .cover-link:hover { text-decoration: underline; }
    .mp3-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      align-self: end;
      padding-bottom: 8px;
    }
    .mp3-link:hover { color: var(--accent); }
    .compact .row {
      grid-template-columns: 96px 1fr;
      padding: 8px;
      gap: 8px;
    }
    .compact .cover-preview { width: 86px; border-radius: 7px; }
    .compact .meta-fields { gap: 6px; }
    .compact input { padding: 6px 8px; }
    .add-panel {
      margin: 16px 0;
      background: #15191f;
      border: 1px dashed #485061;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }
    .add-panel.open { display: block; }
    .add-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .add-row1 {
      display: grid;
      grid-template-columns: 1fr 1fr 68px 52px;
      gap: 8px;
      align-items: end;
    }
    .add-row2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 65px auto;
      gap: 8px;
      align-items: end;
    }
    .add-row1 input { width: 100%; min-width: 0; }
    .add-row2 label { min-width: 0; }
    .add-row2 input { width: 100%; min-width: 0; }
    .track-header { display: flex; align-items: flex-end; gap: 8px; }
    .track-header > label:first-child { flex: 1; min-width: 0; }
    .lyrics-check { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); white-space: nowrap; cursor: pointer; padding-bottom: 8px; font-weight: normal; }
    .lyrics-check input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); margin: 0; width: auto; height: auto; padding: 0; border: none; border-radius: 0; background: none; }
    .tags-row { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
    .tags-input { width: 100%; }
    .tag-suggestions { display: flex; flex-wrap: wrap; gap: 4px; min-height: 4px; }
    .tag-chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--panel2); border: 1px solid var(--line); cursor: pointer; color: var(--muted); line-height: 1.6; user-select: none; }
    .tag-chip.active { background: rgba(40,215,232,0.12); border-color: var(--accent); color: var(--accent); }
    .tag-chip:hover { border-color: var(--muted); }
    .footer-space { height: 88px; }
    .global-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      display: none;
      align-items: center;
      gap: 14px;
      padding: 0 16px 0 12px;
      z-index: 60;
      backdrop-filter: blur(8px);
    }
    .global-player.active { display: flex; }
    .gp-locator {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      border-radius: 8px;
      padding: 4px 8px;
      margin: -4px -8px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .gp-locator:hover { background: var(--panel2); }
    .gp-cover {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .gp-info {
      min-width: 0;
      flex: 0 0 200px;
    }
    .gp-game {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gp-track {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #gpAudio {
      flex: 1;
      min-width: 200px;
      max-width: 700px;
      accent-color: var(--accent);
    }
    #gpClose {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1;
    }
    #gpClose:hover { color: var(--text); background: var(--panel2); }
    .notice {
      border-left: 4px solid var(--warn);
      background: #211d12;
      padding: 10px 12px;
      color: #ffe7a0;
      border-radius: 8px;
      margin: 10px 0;
    }
    .sheets-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 10px 0 2px;
      border-top: 1px solid var(--line);
      margin-top: 8px;
    }
    .sheets-panel.open { display: flex; }
    .sheets-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sheets-label { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 80px; }
    .sheets-url-input { flex: 1; min-width: 300px; font-size: 13px; }
    .sheets-status { font-size: 12px; color: var(--muted); }
    .sheets-status.ok    { color: #6bc832; }
    .sheets-status.error { color: var(--danger); }
    @media (max-width: 900px) {
      .meta-fields {
        grid-template-columns: 1fr 1fr 68px 52px;
      }
      .meta-fields > button[data-action="reloadCover"] { display: none; }
    }
    @media (max-width: 720px) {
      .row, .compact .row {
        grid-template-columns: 1fr;
      }
      .cover-box {
        display: grid;
        grid-template-columns: 90px 1fr;
        align-items: center;
        gap: 10px;
      }
      .meta-fields {
        grid-template-columns: 1fr 68px 52px;
      }
      .meta-fields > label:nth-child(2) { grid-column: 1 / -1; }
      .add-row1 { grid-template-columns: 1fr 68px 52px; }
      .add-row2 { grid-template-columns: 1fr 65px; }
    }
  </style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="../index.html" style="color:var(--accent);text-decoration:none;font-size:26px;line-height:1">←</a>
      <h1 style="margin:0">Database Editor</h1>
    </div>
    <div style="display:flex;gap:6px">
      <a href="https://www.youtube.com" target="_blank" rel="noopener" style="background:#ff0000;color:#fff;border:none;border-radius:8px;padding:7px 12px;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;font-size:14px">YouTube</a>
      <a href="https://www.igdb.com" target="_blank" rel="noopener" style="background:#8c44b0;color:#fff;border:none;border-radius:8px;padding:7px 12px;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;font-size:14px">IGDB</a>
      <a href="https://downloads.khinsider.com/" target="_blank" rel="noopener" style="background:#111;color:#fff;border:1px solid #444;border-radius:8px;padding:7px 12px;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;font-size:14px">Khinside</a>
      <a href="https://archive.org/details/audio" target="_blank" rel="noopener" style="background:#555;color:#fff;border:none;border-radius:8px;padding:7px 12px;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;font-size:14px">Archive.org</a>
      <a href="https://docs.google.com/spreadsheets/d/1PzT5tdB6yQn9c9_R-YObqTqyaN4jRJxqTT4HEm1nh-s/edit?gid=1895228238#gid=1895228238" target="_blank" rel="noopener" style="background:#1e8e3e;color:#fff;border:none;border-radius:8px;padding:7px 12px;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;font-size:14px">Sheets</a>
    </div>
  </div>
  <div class="toolbar">
    <button id="toggleAdd" class="success">Añadir entrada</button>
    <div style="display:flex;gap:0;flex:1;min-width:200px">
      <input id="search" type="search" placeholder="Buscar..." style="flex:1;border-radius:8px 0 0 8px;border-right:0" />
      <button id="searchClear" title="Limpiar búsqueda" style="display:none;border-radius:0;border-left:0;border-right:0;padding:8px 7px;color:var(--muted)">✕</button>
      <select id="searchField" style="border-radius:0 8px 8px 0;padding:8px 6px;min-width:0;width:auto;font-size:13px">
        <option value="all">Todo</option>
        <option value="game">Título</option>
        <option value="tracks">Canción</option>
        <option value="tags">Tags</option>
        <option value="year">Año</option>
        <option value="url">URL</option>
      </select>
    </div>
    <span id="searchStats" class="search-stats"></span>
    <input id="fileInput" type="file" accept=".js,.txt,.json" />
    <button id="sheetsBtn">↓ Google Sheets</button>
    <button id="supabaseBtn">↓ Supabase</button>
    <div class="btn-group">
      <button id="downloadJs" class="primary">Descargar JS</button>
      <button id="downloadJson">JSON</button>
      <button id="downloadCsv">CSV</button>
    </div>
    <div id="pillRow" style="flex-basis:100%;display:none;gap:8px">
      <span id="dirtyPill" class="pill warn" style="display:none">Sin guardar</span>
    </div>
  </div>
  <div id="sheetsPanel" class="sheets-panel">
    <div class="sheets-row">
      <span class="sheets-label">Importar de:</span>
      <input id="sheetsUrlInput" class="sheets-url-input"
             placeholder="URL del Google Sheet..."
             value="https://docs.google.com/spreadsheets/d/1PzT5tdB6yQn9c9_R-YObqTqyaN4jRJxqTT4HEm1nh-s/edit" />
      <input id="sheetsTabInput" style="width:90px;font-size:13px" placeholder="Hoja" value="DATABASE" title="Nombre exacto de la pestaña" />
      <button id="doImportSheets" class="primary">Importar</button>
      <span id="sheetsStatus" class="sheets-status"></span>
    </div>
    <div class="sheets-row">
      <span class="sheets-label">Guardar en:</span>
      <input id="scriptUrlInput" class="sheets-url-input"
             placeholder="URL del Apps Script (Extensions → Apps Script → Implementar)..." />
      <button id="doSaveSheets">Guardar en Sheet</button>
      <span id="saveStatus" class="sheets-status"></span>
    </div>
  </div>
  <div id="supabasePanel" class="sheets-panel">
    <div class="sheets-row">
      <span class="sheets-label">URL proyecto:</span>
      <input id="supabaseUrl" class="sheets-url-input" placeholder="https://xxxx.supabase.co" />
      <span class="sheets-label" style="margin-left:4px">Tabla:</span>
      <input id="supabaseTableInput" style="width:90px;font-size:13px" placeholder="games" value="games" />
    </div>
    <div class="sheets-row">
      <span class="sheets-label">Clave anon:</span>
      <input id="supabaseKey" class="sheets-url-input" type="password" placeholder="eyJhbGci..." />
    </div>
    <div class="sheets-row">
      <button id="doImportSupabase" class="primary">Cargar desde Supabase</button>
      <button id="doSaveSupabase">Guardar en Supabase</button>
      <span id="supabaseStatus" class="sheets-status"></span>
    </div>
    <div class="sheets-row" id="supaBaseDiffRow" style="border-top:1px solid var(--line);padding-top:8px;margin-top:4px">
      <span class="sheets-label" style="color:var(--muted);font-size:12px">Sync parcial:</span>
      <button id="doInsertSupabase" disabled>Añadir nuevas</button>
      <button id="doUpdateSupabase" disabled>Modificar</button>
      <button id="doUpsertSupabase" disabled>Añadir y modificar</button>
    </div>
  </div>
</header>

<main>
  <div id="list" class="list"></div>

  <section id="addPanel" class="add-panel">
    <h2 style="margin:0 0 10px;font-size:17px;">Añadir nueva entrada</h2>
    <div class="add-grid">
      <div class="add-row1">
        <label><span>Juego</span><input id="newGame" placeholder="Nombre del juego" /></label>
        <label><span>Cover URL</span><input id="newCover" class="field-cover" placeholder="https://..." /></label>
        <label><span>Año</span><input id="newYear" type="number" min="1970" max="2100" step="1" value="2026" /></label>
        <label><span>Pop (1–6)</span><input id="newPop" type="number" min="1" max="6" step="1" value="5" /></label>
      </div>
      <div class="add-row-tags" style="display:flex;flex-direction:column;gap:5px">
        <label style="display:grid;gap:4px;color:var(--muted);font-size:12px"><span>Tags</span><input id="newTags" class="field-youtube" placeholder="rpg, action..." /></label>
        <div id="newTagSuggestions" class="tag-suggestions"></div>
      </div>
      <div class="add-row2">
        <div style="display:flex;flex-direction:column;gap:4px;min-width:0">
          <label style="font-size:12px;color:var(--muted)">Canción</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input id="newTitle" placeholder="Canción (opcional)" style="flex:1;min-width:0" />
            <label class="lyrics-check"><input type="checkbox" id="newLyrics" /> lyrics</label>
          </div>
        </div>
        <label><input id="newMp3Url" class="field-youtube" placeholder="URL del MP3…" /></label>
        <label><span>Inicio (m:ss)</span><input id="newStart" class="field-youtube" placeholder="0:00" value="0:00" /></label>
        <button id="newLoadTrack">▶ Cargar</button>
      </div>
    </div>
    <div class="actions" style="margin-top:10px;">
      <button id="addEntry" class="primary">Añadir al final</button>
      <button id="clearNew">Limpiar</button>
    </div>
  </section>

  <div class="footer-space"></div>
</main>

<div id="lightbox" style="display:none" role="dialog" aria-modal="true">
  <img id="lightboxImg" alt="Cover ampliada" />
</div>

<div id="custom-confirm" style="display:none" role="dialog" aria-modal="true">
  <div id="custom-confirm-box">
    <div id="custom-confirm-msg"></div>
    <div id="custom-confirm-btns"></div>
  </div>
</div>

<div class="scroll-btns">
  <button id="scrollTop" title="Ir arriba">↑</button>
  <button id="scrollBottom" title="Ir abajo">↓</button>
</div>

<div id="globalPlayer" class="global-player">
  <div id="gpLocator" class="gp-locator" title="Ir a la entrada">
    <img id="gpCover" class="gp-cover" alt="" />
    <div class="gp-info">
      <div id="gpGame" class="gp-game"></div>
      <div id="gpTrack" class="gp-track"></div>
    </div>
  </div>
  <audio id="gpAudio" controls></audio>
  <button id="gpClose" title="Cerrar reproductor">✕</button>
</div>

<script>
(() => {
  let db = [];
  let dirty = false;
  let compact = false;
  let originalFilename = "database.js";

  const $ = (id) => document.getElementById(id);
  const list = $("list");

  function customConfirm(msg, { ok = "Aceptar", cancel = "Cancelar", okDanger = false } = {}) {
    return new Promise(resolve => {
      $("custom-confirm-msg").textContent = msg;
      const btns = $("custom-confirm-btns");
      btns.innerHTML = "";
      const cancelBtn = document.createElement("button");
      cancelBtn.textContent = cancel;
      cancelBtn.onclick = () => { $("custom-confirm").style.display = "none"; resolve(false); };
      const okBtn = document.createElement("button");
      okBtn.textContent = ok;
      okBtn.className = okDanger ? "danger" : "primary";
      okBtn.onclick = () => { $("custom-confirm").style.display = "none"; resolve(true); };
      btns.append(cancelBtn, okBtn);
      $("custom-confirm").style.display = "flex";
      okBtn.focus();
    });
  }

  function updatePillRow() {
    $("pillRow").style.display = $("dirtyPill").style.display !== "none" ? "flex" : "none";
  }
  let _diffTimer = null;
  function setDirty(value = true) {
    dirty = value;
    $("dirtyPill").style.display = dirty ? "" : "none";
    updatePillRow();
    if (typeof updateSupaDiffBtns === "function") {
      clearTimeout(_diffTimer);
      _diffTimer = setTimeout(updateSupaDiffBtns, 400);
    }
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function jsString(value) {
    return String(value ?? "")
      .replaceAll("\\", "\\\\")
      .replaceAll('"', '\\"');
  }

  function cleanUrl(value) {
    return String(value || "").trim();
  }

  function trackSourceVal(track) {
    return track.mp3Url || '';
  }

  function normalizeAudioUrl(url) {
    return url.replace('archive.org/details/', 'archive.org/download/');
  }

  function tracksSectionHtml(tracks) {
    const rows = tracks.map((track, ti) => {
      const srcVal = escapeHtml(trackSourceVal(track));
      const stVal  = escapeHtml(secondsToTime(track.startSeconds));
      const titleVal = escapeHtml(track.title || "");
      const isFirst = ti === 0;
      const hasLyrics = (track.tags || []).includes('lyrics');
      const removeBtn = isFirst ? '' : `<button class="small danger" data-action="removeTrack" data-track="${ti}">✕</button>`;
      const titleLabel = `<div class="track-header">
          <label style="flex:1;min-width:0"><span>Canción</span><input class="track-title-input" data-field="title" data-track="${ti}" placeholder="Canción (opcional)" value="${titleVal}" /></label>
          <label class="lyrics-check"><input type="checkbox" data-field="trackLyrics" data-track="${ti}"${hasLyrics ? ' checked' : ''} /> lyrics</label>
        </div>`;
      const mp3Link = `<a class="mp3-link" data-mp3link="${ti}"${track.mp3Url ? ` href="${escapeHtml(track.mp3Url)}" target="_blank" rel="noopener"` : ''}>${track.mp3Url ? 'abrir MP3 ↗' : ''}</a>`;
      const srcRow = `<div class="yt-row">
          <label><input class="field-youtube" data-field="source" data-track="${ti}" placeholder="URL del MP3…" value="${srcVal}" /></label>
          <label><input class="field-youtube" placeholder="0:00" data-field="startSeconds" data-track="${ti}" value="${stVal}" /></label>
          <button class="small" data-action="loadTrack" data-track="${ti}">▶ Cargar</button>
          ${mp3Link}
        </div>`;
      return `<div class="track-block${isFirst ? '' : ' track-block--extra'}">${removeBtn}${titleLabel}${srcRow}</div>`;
    }).join("");
    return rows + `<button class="small" data-action="addTrack" style="margin-top:6px">+</button>`;
  }

  function parseGameDb(text) {
    let src = String(text || "").trim();

    try {
      const parsed = JSON.parse(src);
      if (Array.isArray(parsed)) return parsed;
      if (Array.isArray(parsed.GAME_DB)) return parsed.GAME_DB;
    } catch {}

    const assignIndex = src.search(/\bGAME_DB\b\s*=/);
    let arrayText = "";
    if (assignIndex >= 0) {
      const after = src.slice(assignIndex);
      const bracketStart = after.indexOf("[");
      if (bracketStart < 0) throw new Error("No encuentro '[' después de GAME_DB =");
      arrayText = extractBalanced(after.slice(bracketStart), "[", "]");
    } else {
      const bracketStart = src.indexOf("[");
      if (bracketStart >= 0) arrayText = extractBalanced(src.slice(bracketStart), "[", "]");
      else arrayText = "[" + src + "]";
    }

    const arr = Function(`"use strict"; return (${arrayText});`)();
    if (!Array.isArray(arr)) throw new Error("GAME_DB no es un array");
    return arr;
  }

  function extractBalanced(s, open, close) {
    let depth = 0, quote = null, escape = false;
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (quote) {
        if (escape) { escape = false; continue; }
        if (ch === "\\") { escape = true; continue; }
        if (ch === quote) quote = null;
        continue;
      }
      if (ch === '"' || ch === "'" || ch === "`") { quote = ch; continue; }
      if (ch === open) depth++;
      if (ch === close) {
        depth--;
        if (depth === 0) return s.slice(0, i + 1);
      }
    }
    throw new Error("No se pudo cerrar el array GAME_DB");
  }

  function normalizeTracks(x) {
    const norm = t => ({
      title:        String(t.title ?? "").trim(),
      mp3Url:       String(t.mp3Url ?? t.url ?? "").trim(),
      startSeconds: Math.max(0, Number(t.startSeconds) || 0),
      tags:         Array.isArray(t.tags) ? t.tags.map(String).filter(Boolean) : [],
    });
    if (Array.isArray(x.tracks) && x.tracks.length > 0) return x.tracks.map(norm);
    return [norm(x)];
  }

  function normalizeDb(arr) {
    return arr.map((x, idx) => ({
      id:     Number(x.id) || idx + 1,
      game:   String(x.game ?? "").trim(),
      cover:  cleanUrl(x.cover ?? ""),
      tracks: normalizeTracks(x),
      pop:    Number(x.pop) || 1,
      year:   Number(x.year) || 0,
      tags:   Array.isArray(x.tags) ? x.tags.map(String).filter(Boolean) : [],
    }));
  }

  function getAllTags() {
    const set = new Set();
    db.forEach(item => (item.tags || []).forEach(t => set.add(t)));
    return [...set].sort();
  }

  function tagSuggestionsHtml(activeTags) {
    const all = getAllTags();
    if (!all.length) return '';
    return all.map(tag => {
      const active = activeTags.includes(tag);
      return `<span class="tag-chip${active ? ' active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`;
    }).join('');
  }

  function secondsToTime(s) {
    const total = Math.max(0, Number(s) || 0);
    const m = Math.floor(total / 60);
    const sec = total % 60;
    return `${m}:${String(sec).padStart(2, "0")}`;
  }

  function timeToSeconds(val) {
    const s = String(val || "").trim();
    if (s.includes(":")) {
      const [m, sec] = s.split(":");
      return Math.max(0, (parseInt(m, 10) || 0) * 60 + (parseInt(sec, 10) || 0));
    }
    return Math.max(0, Number(s) || 0);
  }

  function updateStats() {
    const total = db.length;
    const q = $("search").value.trim();
    const visible = q ? [...document.querySelectorAll(".row")].filter(r => !r.classList.contains("hidden")).length : total;
    $("searchStats").textContent = total === 0 ? "" : q ? `${visible} de ${total}` : `${total} entradas`;
    updatePillRow();
  }

  function coverHtml(item) {
    if (!item.cover) {
      return `<div class="cover-preview missing">Sin cover</div>`;
    }
    return `<img class="cover-preview" src="${escapeHtml(item.cover)}" alt="Cover de ${escapeHtml(item.game)}" loading="lazy"
      onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'cover-preview missing', textContent:'Cover no carga'}));" />`;
  }

  function buildRowContent(item) {
    return `
      <div class="cover-box">
        <div class="cover-holder">${coverHtml(item)}</div>
        ${item.cover ? `<a class="cover-link" target="_blank" rel="noopener" href="${escapeHtml(item.cover)}">abrir cover ↗</a>` : `<span class="cover-link" style="color:var(--muted)">sin cover</span>`}
      </div>
      <div class="meta">
        <div class="titleline">
          <span class="row-id">#${escapeHtml(item.id)}</span>
          <span class="game-title">${escapeHtml(item.game || "(sin título)")}</span>
          <button class="small" data-action="duplicate">Duplicar</button>
          <button class="small danger" data-action="delete">Eliminar</button>
        </div>
        <div class="meta-fields">
          <label><span>Juego</span><input class="game-input" data-field="game" value="${escapeHtml(item.game)}" /></label>
          <label><span>Cover URL</span><input class="field-cover" data-field="cover" value="${escapeHtml(item.cover)}" placeholder="https://..." /></label>
          <button class="small" data-action="reloadCover">↺ Cover</button>
          <label><span>Año</span><input type="number" min="1970" max="2100" step="1" data-field="year" value="${escapeHtml(item.year)}" /></label>
          <label><span>Pop</span><input type="number" min="1" max="6" step="1" data-field="pop" value="${escapeHtml(item.pop)}" /></label>
        </div>
        <div class="tags-row">
          <label><span>Tags</span><input class="tags-input field-youtube" data-field="tags" value="${escapeHtml((item.tags || []).join(', '))}" placeholder="rpg, action..." /></label>
          <div class="tag-suggestions">${tagSuggestionsHtml(item.tags || [])}</div>
        </div>
        <div class="tracks-section">${tracksSectionHtml(item.tracks)}</div>
      </div>
    `;
  }

  function rowSearchAttrs(item) {
    return {
      'data-search': `${item.game} ${item.tracks.map(t => t.mp3Url).join(" ")} ${item.cover} ${item.year} ${item.pop} ${(item.tags||[]).join(" ")}`.toLowerCase(),
      'data-sg':   item.game.toLowerCase(),
      'data-st':   item.tracks.map(t => t.title).join(" ").toLowerCase(),
      'data-stag': (item.tags||[]).join(" ").toLowerCase(),
      'data-sy':   String(item.year),
      'data-su':   item.tracks.map(t => t.mp3Url).join(" ").toLowerCase(),
    };
  }

  function updateRowSearch(row, index) {
    const attrs = rowSearchAttrs(db[index]);
    for (const [k, v] of Object.entries(attrs)) row.setAttribute(k, v);
  }

  let _rowObserver = null;

  function fillRow(row) {
    if (row.dataset.filled) return;
    row.dataset.filled = "1";
    row.innerHTML = buildRowContent(db[Number(row.dataset.index)]);
    if (_rowObserver) _rowObserver.unobserve(row);
  }

  function fillAllRows() {
    list.querySelectorAll(".row:not([data-filled])").forEach(fillRow);
  }

  function render() {
    document.body.classList.toggle("compact", compact);
    if (_rowObserver) { _rowObserver.disconnect(); _rowObserver = null; }

    list.innerHTML = db.map((item, index) => {
      const a = rowSearchAttrs(item);
      return `<article class="row" data-index="${index}" data-search="${escapeHtml(a['data-search'])}" data-sg="${escapeHtml(a['data-sg'])}" data-st="${escapeHtml(a['data-st'])}" data-stag="${escapeHtml(a['data-stag'])}" data-sy="${escapeHtml(a['data-sy'])}" data-su="${escapeHtml(a['data-su'])}"></article>`;
    }).join("");

    _rowObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) fillRow(e.target); });
    }, { rootMargin: "500px 0px" });

    list.querySelectorAll(".row").forEach(row => _rowObserver.observe(row));

    applySearch();
    updateStats();
  }

  function updateItemFromInput(input) {
    const row = input.closest(".row");
    const index = Number(row.dataset.index);
    const field = input.dataset.field;

    if (field === "trackLyrics") {
      const ti = Number(input.dataset.track);
      const track = db[index].tracks[ti];
      if (!track.tags) track.tags = [];
      if (input.checked) { if (!track.tags.includes('lyrics')) track.tags.push('lyrics'); }
      else track.tags = track.tags.filter(t => t !== 'lyrics');
      setDirty(true);
      return;
    }

    const trackIdx = input.dataset.track !== undefined ? Number(input.dataset.track) : null;
    let value = input.value;

    if (trackIdx !== null) {
      const track = db[index].tracks[trackIdx];
      if (field === "source") {
        track.mp3Url = normalizeAudioUrl(value);
        input.value  = track.mp3Url;
        const loadBtn = row.querySelector(`button[data-action="loadTrack"][data-track="${trackIdx}"]`);
        if (loadBtn) { loadBtn.textContent = "▶ Cargar"; loadBtn.disabled = false; }
        const mp3LinkEl = row.querySelector(`[data-mp3link="${trackIdx}"]`);
        if (mp3LinkEl) {
          const newA = document.createElement('a');
          newA.className = 'mp3-link';
          newA.dataset.mp3link = String(trackIdx);
          if (track.mp3Url) {
            newA.href = track.mp3Url;
            newA.target = '_blank';
            newA.rel = 'noopener';
            newA.textContent = 'abrir MP3 ↗';
          }
          mp3LinkEl.replaceWith(newA);
        }
      } else if (field === "startSeconds") {
        track.startSeconds = timeToSeconds(value);
        input.value = secondsToTime(track.startSeconds);
        const loadBtn = row.querySelector(`button[data-action="loadTrack"][data-track="${trackIdx}"]`);
        if (loadBtn) { loadBtn.textContent = "▶ Cargar"; loadBtn.disabled = false; }
      } else if (field === "title") {
        track.title = value;
      }
    } else {
      if (field === "tags") {
        db[index].tags = value.split(',').map(t => t.trim()).filter(Boolean);
        const suggestions = row.querySelector('.tag-suggestions');
        if (suggestions) suggestions.innerHTML = tagSuggestionsHtml(db[index].tags);
      } else {
        if (field === "cover") value = cleanUrl(value);
        if (["pop", "year"].includes(field)) value = Number(value) || 0;
        if (field === "pop") value = Math.max(1, Math.min(6, value));
        db[index][field] = value;
        if (field === "cover") input.value = value;
        if (field === "game") {
          const title = row.querySelector(".game-title");
          if (title) title.textContent = value || "(sin título)";
        }
        if (field === "cover") reloadRowCover(row);
      }
    }

    updateRowSearch(row, index);
    setDirty(true);
    updateStats();
  }

  function stopAllMedia() {
    $("gpAudio").pause();
  }

  let _gpIndex = -1;

  function loadTrackInPlayer(track, gameName, coverUrl, btn) {
    if (!track?.mp3Url) return;
    stopAllMedia();
    if (btn) { btn.textContent = "Cargando…"; btn.disabled = true; }

    const audio = $("gpAudio");
    $("gpGame").textContent = gameName;
    $("gpTrack").textContent = track.title || "";
    const gpCover = $("gpCover");
    if (coverUrl) { gpCover.src = coverUrl; gpCover.style.display = ""; }
    else gpCover.style.display = "none";

    audio.src = track.mp3Url;
    $("globalPlayer").classList.add("active");

    const restoreBtn = () => { if (btn) { btn.textContent = "▶ Cargar"; btn.disabled = false; } };
    audio.addEventListener('loadedmetadata', () => {
      if (track.startSeconds > 0) audio.currentTime = track.startSeconds;
    }, { once: true });
    audio.addEventListener('canplay', () => { restoreBtn(); audio.play().catch(() => {}); }, { once: true });
    audio.addEventListener('error', restoreBtn, { once: true });
    audio.load();
  }

  function loadInGlobalPlayer(index, ti, btn) {
    _gpIndex = index;
    const item = db[index];
    const track = item.tracks[ti];
    loadTrackInPlayer(track, item.game, item.cover, btn);
  }

  function reloadRowCover(row) {
    const index = Number(row.dataset.index);
    const holder = row.querySelector(".cover-holder");
    const link = row.querySelector(".cover-link");
    if (holder) holder.innerHTML = coverHtml(db[index]);
    if (link) {
      if (db[index].cover) {
        link.textContent = "abrir cover ↗";
        link.href = db[index].cover;
        link.style.color = "";
      } else {
        link.textContent = "sin enlace";
        link.removeAttribute("href");
        link.style.color = "var(--muted)";
      }
    }
  }

  list.addEventListener("change", (e) => {
    if (e.target.matches("input[data-field]")) updateItemFromInput(e.target);
  });

  list.addEventListener("keydown", (e) => {
    if (e.target.matches("input[data-field]") && e.key === "Enter") e.target.blur();
  });

  list.addEventListener("click", (e) => {
    const cover = e.target.closest("img.cover-preview");
    if (cover) {
      $("lightboxImg").src = cover.src;
      $("lightbox").style.display = "flex";
      return;
    }

    const chip = e.target.closest(".tag-chip");
    if (chip) {
      const row = chip.closest(".row");
      const index = Number(row.dataset.index);
      const tag = chip.dataset.tag;
      const tagsInput = row.querySelector('input[data-field="tags"]');
      if (tagsInput) {
        const tags = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);
        if (tags.includes(tag)) {
          const newTags = tags.filter(t => t !== tag);
          tagsInput.value = newTags.join(', ');
          db[index].tags = newTags;
          chip.classList.remove('active');
        } else {
          tags.push(tag);
          tagsInput.value = tags.join(', ');
          db[index].tags = tags;
          chip.classList.add('active');
        }
        updateRowSearch(row, index);
        setDirty(true);
      }
      return;
    }

    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const row = btn.closest(".row");
    const index = Number(row.dataset.index);
    const action = btn.dataset.action;

    if (action === "loadTrack") {
      const ti = Number(btn.dataset.track || 0);
      loadInGlobalPlayer(index, ti, btn);
    } else if (action === "reloadCover") {
      reloadRowCover(row);
    } else if (action === "addTrack") {
      db[index].tracks.push({ title: "", mp3Url: "", startSeconds: 0 });
      setDirty(true);
      row.querySelector(".tracks-section").innerHTML = tracksSectionHtml(db[index].tracks);
    } else if (action === "removeTrack") {
      const ti = Number(btn.dataset.track);
      if (db[index].tracks.length > 1) {
        const track = db[index].tracks[ti];
        const doRemove = () => {
          db[index].tracks.splice(ti, 1);
          setDirty(true);
          row.querySelector(".tracks-section").innerHTML = tracksSectionHtml(db[index].tracks);
        };
        if (track.mp3Url || track.title) {
          customConfirm(`¿Eliminar la canción "${track.title || 'sin título'}"?`, { ok: "Eliminar", okDanger: true }).then(ok => { if (ok) doRemove(); });
        } else {
          doRemove();
        }
      }
    } else if (action === "duplicate") {
      const maxId = db.reduce((m, x) => Math.max(m, Number(x.id) || 0), 0);
      db.splice(index + 1, 0, { ...db[index], id: maxId + 1, game: db[index].game + " (copia)", tracks: db[index].tracks.map(t => ({ ...t })) });
      setDirty(true);
      render();
    } else if (action === "delete") {
      customConfirm(`¿Eliminar "${db[index].game}"?`, { ok: "Eliminar", okDanger: true }).then(ok => {
        if (!ok) return;
        db.splice(index, 1);
        setDirty(true);
        render();
      });
    }
  });

  const SEARCH_ATTR = { all: 'data-search', game: 'data-sg', tracks: 'data-st', tags: 'data-stag', year: 'data-sy', url: 'data-su' };

  function applySearch() {
    const q = $("search").value.trim().toLowerCase();
    if (!q) {
      list.classList.remove("filtering");
      updateStats();
      return;
    }
    const attr = SEARCH_ATTR[$("searchField").value] || 'data-search';
    list.classList.add("filtering");
    document.querySelectorAll(".row").forEach(row => {
      row.classList.toggle("hidden", !(row.getAttribute(attr) || '').includes(q));
    });
    updateStats();
  }

  $("search").addEventListener("input", () => {
    $("searchClear").style.display = $("search").value ? "" : "none";
    applySearch();
  });
  $("searchClear").addEventListener("click", () => {
    $("search").value = "";
    $("searchClear").style.display = "none";
    applySearch();
  });
  $("searchField").addEventListener("change", applySearch);

  $("fileInput").addEventListener("change", async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    loadText(await file.text(), file.name);
    e.target.value = "";
  });

  function refreshNewTagSuggestions() {
    const active = $("newTags").value.split(',').map(t => t.trim()).filter(Boolean);
    $("newTagSuggestions").innerHTML = tagSuggestionsHtml(active);
  }

  $("newTagSuggestions").addEventListener("click", (e) => {
    const chip = e.target.closest(".tag-chip");
    if (!chip) return;
    const tag = chip.dataset.tag;
    const tags = $("newTags").value.split(',').map(t => t.trim()).filter(Boolean);
    if (tags.includes(tag)) {
      $("newTags").value = tags.filter(t => t !== tag).join(', ');
      chip.classList.remove('active');
    } else {
      tags.push(tag);
      $("newTags").value = tags.join(', ');
      chip.classList.add('active');
    }
  });

  $("newTags").addEventListener("change", refreshNewTagSuggestions);

  $("toggleAdd").addEventListener("click", () => {
    $("addPanel").classList.toggle("open");
    refreshNewTagSuggestions();
    $("newGame").focus();
  });

  $("clearNew").addEventListener("click", () => {
    $("newGame").value = "";
    $("newCover").value = "";
    $("newTitle").value = "";
    $("newLyrics").checked = false;
    $("newMp3Url").value = "";
    $("newStart").value = "0:00";
    $("newTags").value = "";
    $("newPop").value = 6;
    $("newYear").value = new Date().getFullYear();
  });

  $("addEntry").addEventListener("click", () => {
    const game = $("newGame").value.trim();
    const cover = cleanUrl($("newCover").value);
    const title = $("newTitle").value.trim();
    const sourceVal = $("newMp3Url").value.trim();
    const startSeconds = timeToSeconds($("newStart").value);
    const pop = Math.max(1, Math.min(10, Number($("newPop").value) || 6));
    const year = Number($("newYear").value) || new Date().getFullYear();

    if (!game) return alert("Falta el nombre del juego.");
    if (!sourceVal) return alert("Falta la URL del MP3.");

    const tags = $("newTags").value.split(',').map(t => t.trim()).filter(Boolean);
    const track = { title, mp3Url: normalizeAudioUrl(sourceVal), startSeconds, tags: $("newLyrics").checked ? ['lyrics'] : [] };

    const maxId = db.reduce((m, x) => Math.max(m, Number(x.id) || 0), 0);
    db.push({ id: maxId + 1, game, cover, pop, year, tags, tracks: [track] });
    setDirty(true);
    $("clearNew").click();
    $("addPanel").classList.remove("open");
    render();
    setTimeout(() => {
      fillAllRows();
      requestAnimationFrame(() => {
        const lastRow = list.querySelector(".row:last-child");
        if (lastRow) lastRow.scrollIntoView({ behavior: "smooth", block: "end" });
      });
    }, 50);
  });

  function loadText(text, filename) {
    try {
      db = normalizeDb(parseGameDb(text));
      originalFilename = filename || "database.js";
      setDirty(false);
      render();
    } catch (err) {
      alert("No he podido leer el archivo: " + err.message);
      console.error(err);
    }
  }

  function toJs() {
    const lines = db.map(item => {
      const coverPart = item.cover ? ` cover: "${jsString(item.cover)}",` : "";
      const tagsPart  = item.tags?.length ? ` tags: [${item.tags.map(t => `'${jsString(t)}'`).join(', ')}],` : "";
      const tracksPart = item.tracks.map(t => {
        const p = [];
        if (t.title)  p.push(`title: "${jsString(t.title)}"`);
        if (t.mp3Url) { p.push(`mp3Url: "${jsString(t.mp3Url)}"`); if (t.startSeconds > 0) p.push(`startSeconds: ${Number(t.startSeconds)}`); }
        if (t.tags?.length) p.push(`tags: [${t.tags.map(tg => `'${jsString(tg)}'`).join(', ')}]`);
        if (p.length === 0) p.push(`mp3Url: ""`);
        return `{ ${p.join(", ")} }`;
      }).join(", ");
      return `  { id: ${Number(item.id) || 0}, game: "${jsString(item.game)}",${coverPart} pop: ${Number(item.pop) || 1}, year: ${Number(item.year) || 0},${tagsPart} tracks: [${tracksPart}] },`;
    });
    return `const GAME_DB = [\n${lines.join("\n")}\n];\n`;
  }

  function download(filename, content, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
    setDirty(false);
  }

  $("downloadJs").addEventListener("click", () => {
    const base = originalFilename.replace(/\.(js|txt|json)$/i, "") || "database";
    download(`${base}.js`, toJs(), "text/javascript;charset=utf-8");
  });

  $("downloadJson").addEventListener("click", () => {
    const base = originalFilename.replace(/\.(js|txt|json)$/i, "") || "database";
    download(`${base}.json`, JSON.stringify(db, null, 2), "application/json;charset=utf-8");
  });

  window.addEventListener("beforeunload", (e) => {
    if (!dirty) return;
    e.preventDefault();
    e.returnValue = "";
  });



  $("lightbox").addEventListener("click", () => $("lightbox").style.display = "none");
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") $("lightbox").style.display = "none";
  });

  $("gpClose").addEventListener("click", () => {
    $("gpAudio").pause();
    $("globalPlayer").classList.remove("active");
    _gpIndex = -1;
  });

  $("newLoadTrack").addEventListener("click", function() {
    const mp3Url = normalizeAudioUrl($("newMp3Url").value.trim());
    if (!mp3Url) return;
    _gpIndex = -1;
    loadTrackInPlayer(
      { mp3Url, startSeconds: timeToSeconds($("newStart").value), title: $("newTitle").value.trim() },
      $("newGame").value.trim() || "(nueva entrada)",
      $("newCover").value.trim(),
      this
    );
  });

  $("gpLocator").addEventListener("click", () => {
    if (_gpIndex < 0) return;
    const row = list.querySelector(`.row[data-index="${_gpIndex}"]`);
    if (!row) return;
    fillRow(row);
    row.scrollIntoView({ behavior: "smooth", block: "center" });
  });

  $("scrollTop").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  $("scrollBottom").addEventListener("click", () => {
    fillAllRows();
    requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }));
  });

  $("newYear").value = new Date().getFullYear();


  // ── Google Sheets import ────────────────────────────────────────────────────

  function extractSheetId(urlOrId) {
    const m = urlOrId.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    return m ? m[1] : urlOrId.trim();
  }

  function normalizeSheetKeys(obj) {
    const map = {
      startseconds: "startSeconds", start_seconds: "startSeconds", "start seconds": "startSeconds",
      start: "startSeconds", inicio: "startSeconds",
      mp3url: "mp3Url", mp3: "mp3Url", url: "mp3Url",
      popularidad: "pop", popularity: "pop",
      juego: "game", "año": "year", ano: "year", portada: "cover",
    };
    const result = {};
    for (const [k, v] of Object.entries(obj)) {
      result[map[k] ?? k] = v;
    }
    return result;
  }

  const SCRIPT_URL_KEY = "ostquest_script_url";
  const savedScriptUrl = localStorage.getItem(SCRIPT_URL_KEY);
  if (savedScriptUrl) $("scriptUrlInput").value = savedScriptUrl;

  $("sheetsBtn").addEventListener("click", () => {
    $("sheetsPanel").classList.toggle("open");
  });

  $("doImportSheets").addEventListener("click", async () => {
    const sheetId = extractSheetId($("sheetsUrlInput").value);
    const status = $("sheetsStatus");
    status.textContent = "Importando...";
    status.className = "sheets-status";

    try {
      const tab = $("sheetsTabInput").value.trim();
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=1${tab ? `&sheet=${encodeURIComponent(tab)}` : ""}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();

      const jsonStr = text.slice(text.indexOf("(") + 1, text.lastIndexOf(")"));
      const data = JSON.parse(jsonStr);

      if (data.status !== "ok") throw new Error(data.errors?.[0]?.message || "Error de Google Sheets");

      const { cols, rows } = data.table;
      const headers = cols.map(c => (c.label || c.id).toLowerCase().trim());

      const raw = rows
        .filter(row => row.c?.some(cell => cell?.v != null))
        .map(row => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = row.c[i]?.v ?? ""; });
          return normalizeSheetKeys(obj);
        });

      db = normalizeDb(raw);
      originalFilename = "database";
      setDirty(false);
      render();

      status.textContent = `✓ ${db.length} entradas importadas`;
      status.className = "sheets-status ok";
      $("sheetsPanel").classList.remove("open");
    } catch (err) {
      status.textContent = "Error: " + err.message;
      status.className = "sheets-status error";
      console.error(err);
    }
  });

  $("doSaveSheets").addEventListener("click", async () => {
    const scriptUrl = $("scriptUrlInput").value.trim();
    const status = $("saveStatus");
    if (!scriptUrl) {
      status.textContent = "Introduce la URL del Apps Script.";
      status.className = "sheets-status error";
      return;
    }
    if (db.length === 0) {
      status.textContent = "No hay datos cargados para guardar.";
      status.className = "sheets-status error";
      return;
    }

    status.textContent = "Guardando...";
    status.className = "sheets-status";
    localStorage.setItem(SCRIPT_URL_KEY, scriptUrl);

    try {
      const CHUNK = 3;
      const session = Date.now().toString(36);
      const chunks = [];
      for (let i = 0; i < db.length; i += CHUNK) chunks.push(db.slice(i, i + CHUNK));

      for (let i = 0; i < chunks.length; i++) {
        status.textContent = `Enviando ${i + 1}/${chunks.length}...`;
        const params = new URLSearchParams({
          action: 'save_chunk',
          session,
          chunk: i,
          total: chunks.length,
          data: JSON.stringify(chunks[i])
        });
        const res = await fetch(`${scriptUrl}?${params}`);
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch { throw new Error('Respuesta inesperada: ' + text.slice(0, 120)); }
        if (json.ok === false) throw new Error(json.error || 'Error en el script');
      }

      status.textContent = `✓ ${db.length} entradas guardadas en el Sheet`;
      status.className = "sheets-status ok";
    } catch (err) {
      status.textContent = "Error de red: " + err.message;
      status.className = "sheets-status error";
    }
  });

  // ── Supabase ──────────────────────────────────────────────────────────────

  const SUPA_STORAGE_KEY = "ostquest_supabase";
  const savedSupa = JSON.parse(localStorage.getItem(SUPA_STORAGE_KEY) || "{}");
  if (savedSupa.url)   $("supabaseUrl").value         = savedSupa.url;
  if (savedSupa.key)   $("supabaseKey").value         = savedSupa.key;
  if (savedSupa.table) $("supabaseTableInput").value  = savedSupa.table;

  $("supabaseBtn").addEventListener("click", () => {
    $("supabasePanel").classList.toggle("open");
  });

  function getSupaClient() {
    const url = $("supabaseUrl").value.trim();
    const key = $("supabaseKey").value.trim();
    if (!url || !key) throw new Error("Introduce la URL del proyecto y la clave anon");
    localStorage.setItem(SUPA_STORAGE_KEY, JSON.stringify({
      url, key, table: $("supabaseTableInput").value.trim() || "games"
    }));
    return supabase.createClient(url, key);
  }

  $("doImportSupabase").addEventListener("click", async () => {
    const status = $("supabaseStatus");
    status.textContent = "Cargando...";
    status.className = "sheets-status";
    try {
      const client = getSupaClient();
      const table = $("supabaseTableInput").value.trim() || "games";
      const { data, error } = await client.from(table).select("*").order("id");
      if (error) throw error;
      const incoming = normalizeDb(data);
      if (db.length > 0) {
        const totalTracks = arr => arr.reduce((s, x) => s + x.tracks.length, 0);
        const warnings = [];
        if (incoming.length < db.length) warnings.push(`${db.length - incoming.length} entrada(s) menos (${incoming.length} vs ${db.length} en memoria)`);
        if (totalTracks(incoming) < totalTracks(db)) warnings.push(`${totalTracks(db) - totalTracks(incoming)} canción(es) menos (${totalTracks(incoming)} vs ${totalTracks(db)} en memoria)`);
        if (warnings.length > 0) {
          if (!await customConfirm(`Supabase tiene menos datos que lo que tienes en memoria: ${warnings.join("; ")}. Si cargas, perderás lo que tienes.`, { ok: "Cargar de todos modos", cancel: "Cancelar", okDanger: true })) return;
        }
      }
      db = incoming;
      originalFilename = "database";
      setSupaBaseline(incoming);
      setDirty(false);
      render();
      status.textContent = `✓ ${db.length} entradas cargadas`;
      status.className = "sheets-status ok";
      $("supabasePanel").classList.remove("open");
    } catch (err) {
      status.textContent = "Error: " + err.message;
      status.className = "sheets-status error";
      console.error(err);
    }
  });

  $("doSaveSupabase").addEventListener("click", async () => {
    const status = $("supabaseStatus");
    if (db.length === 0) {
      status.textContent = "No hay datos cargados.";
      status.className = "sheets-status error";
      return;
    }
    if (!await customConfirm(`¿Sobrescribir la tabla en Supabase con ${db.length} entradas? Esta acción no se puede deshacer.`, { ok: "Sobrescribir", okDanger: true })) return;
    status.textContent = "Comprobando...";
    status.className = "sheets-status";
    try {
      const clientCheck = getSupaClient();
      const table = $("supabaseTableInput").value.trim() || "games";
      const { data: currentData, error: countError } = await clientCheck.from(table).select("id, tracks");
      if (!countError && currentData) {
        const totalTracks = arr => arr.reduce((s, x) => s + (Array.isArray(x.tracks) ? x.tracks.length : 1), 0);
        const warnings = [];
        if (db.length < currentData.length) warnings.push(`${currentData.length - db.length} entrada(s) menos (${db.length} vs ${currentData.length} en Supabase)`);
        if (totalTracks(db) < totalTracks(currentData)) warnings.push(`${totalTracks(currentData) - totalTracks(db)} canción(es) menos (${totalTracks(db)} vs ${totalTracks(currentData)} en Supabase)`);
        if (warnings.length > 0) {
          if (!await customConfirm(`Lo que vas a subir tiene menos datos que lo que hay en Supabase: ${warnings.join("; ")}.`, { ok: "Subir de todos modos", cancel: "Cancelar", okDanger: true })) return;
        }
      }
    } catch (_) {
      if (!await customConfirm("No se ha podido comprobar cuántas entradas hay en Supabase. Si continúas, podrías sobrescribir datos sin saberlo.", { ok: "Subir de todos modos", cancel: "Cancelar", okDanger: true })) return;
    }
    const now = new Date();
    const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}-${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`;
    download(`database-${stamp}.js`, toJs(), "text/javascript;charset=utf-8");
    status.textContent = "Guardando...";
    status.className = "sheets-status";
    try {
      const client = getSupaClient();
      const table = $("supabaseTableInput").value.trim() || "games";
      const { error: delError } = await client.from(table).delete().gte("id", 0);
      if (delError) throw delError;
      const { error: insError } = await client.from(table).insert(db);
      if (insError) throw insError;
      setSupaBaseline(db);
      status.textContent = `✓ ${db.length} entradas guardadas en Supabase`;
      status.className = "sheets-status ok";
      setDirty(false);
    } catch (err) {
      status.textContent = "Error: " + err.message;
      status.className = "sheets-status error";
      console.error(err);
    }
  });

  // ── Supabase diff / sync parcial ─────────────────────────────────────────

  let _supaBaseline = null;

  function setSupaBaseline(data) {
    _supaBaseline = new Map(data.map(item => [item.id, JSON.stringify(item)]));
    updateSupaDiffBtns();
  }

  function getSupaDiff() {
    if (!_supaBaseline) return { newEntries: [], modifiedEntries: [] };
    const newEntries = [], modifiedEntries = [];
    for (const item of db) {
      if (!_supaBaseline.has(item.id)) newEntries.push(item);
      else if (_supaBaseline.get(item.id) !== JSON.stringify(item)) modifiedEntries.push(item);
    }
    return { newEntries, modifiedEntries };
  }

  function updateSupaDiffBtns() {
    const { newEntries, modifiedEntries } = getSupaDiff();
    const hasNew = newEntries.length > 0, hasMod = modifiedEntries.length > 0;
    $("doInsertSupabase").disabled  = !hasNew;
    $("doUpdateSupabase").disabled  = !hasMod;
    $("doUpsertSupabase").disabled  = !(hasNew && hasMod);
    $("doInsertSupabase").textContent = hasNew ? `Añadir nuevas (${newEntries.length})` : "Añadir nuevas";
    $("doUpdateSupabase").textContent = hasMod ? `Modificar (${modifiedEntries.length})` : "Modificar";
    $("doUpsertSupabase").textContent = (hasNew && hasMod) ? `Añadir y modificar (${newEntries.length}+${modifiedEntries.length})` : "Añadir y modificar";
  }

  async function runPartialSync(entries, label) {
    const status = $("supabaseStatus");
    const now = new Date();
    const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}-${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`;
    download(`database-${stamp}.js`, toJs(), "text/javascript;charset=utf-8");
    status.textContent = "Guardando...";
    status.className = "sheets-status";
    try {
      const client = getSupaClient();
      const table = $("supabaseTableInput").value.trim() || "games";
      const { error } = await client.from(table).upsert(entries, { onConflict: "id" });
      if (error) throw error;
      entries.forEach(item => _supaBaseline.set(item.id, JSON.stringify(item)));
      updateSupaDiffBtns();
      status.textContent = `✓ ${label}`;
      status.className = "sheets-status ok";
    } catch (err) {
      status.textContent = "Error: " + err.message;
      status.className = "sheets-status error";
      console.error(err);
    }
  }

  $("doInsertSupabase").addEventListener("click", async () => {
    const { newEntries } = getSupaDiff();
    if (!newEntries.length) return;
    if (!await customConfirm(`¿Añadir ${newEntries.length} entrada(s) nueva(s) a Supabase?`, { ok: "Añadir" })) return;
    await runPartialSync(newEntries, `${newEntries.length} entrada(s) añadida(s)`);
  });

  $("doUpdateSupabase").addEventListener("click", async () => {
    const { modifiedEntries } = getSupaDiff();
    if (!modifiedEntries.length) return;
    if (!await customConfirm(`¿Actualizar ${modifiedEntries.length} entrada(s) modificada(s) en Supabase?`, { ok: "Modificar" })) return;
    await runPartialSync(modifiedEntries, `${modifiedEntries.length} entrada(s) modificada(s)`);
  });

  $("doUpsertSupabase").addEventListener("click", async () => {
    const { newEntries, modifiedEntries } = getSupaDiff();
    if (!newEntries.length && !modifiedEntries.length) return;
    if (!await customConfirm(`¿Subir ${newEntries.length} nueva(s) y ${modifiedEntries.length} modificada(s) a Supabase?`, { ok: "Subir" })) return;
    await runPartialSync([...newEntries, ...modifiedEntries], `${newEntries.length} añadida(s), ${modifiedEntries.length} modificada(s)`);
  });

  $("downloadCsv").addEventListener("click", () => {
    const headers = ["id", "game", "cover", "pop", "year", "tracks"];
    const escape = val => {
      const s = String(val ?? "");
      return s.includes(",") || s.includes('"') || s.includes("\n")
        ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const lines = [
      headers.join(","),
      ...db.map(item => headers.map(h => h === "tracks" ? escape(JSON.stringify(item.tracks)) : escape(item[h])).join(","))
    ];
    const base = originalFilename.replace(/\.(js|txt|json)$/i, "") || "database";
    download(`${base}.csv`, lines.join("\n"), "text/csv;charset=utf-8");
  });

})();
</script>
</body>
